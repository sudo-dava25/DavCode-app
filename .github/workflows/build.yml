name: Build Dav Code APK

# Triggers:
# - Push to main -> build + upload debug & release APK as artifacts
# - Tag push like v1.0.0 -> additionally create a GitHub Release with the APK attached
# - Manual trigger from the Actions tab
# - Pull requests -> build & analyze only (sanity check), no artifact upload required
on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Avoid overlapping runs for the same branch/PR piling up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: "stable"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Analyze, test & build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (required by the Android Gradle Plugin)
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      # Gradle caching — speeds up subsequent builds significantly.
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 2b. Setup Flutter environment (stable channel)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Run flutter analyze (non-blocking warnings still surface in logs;
      # remove `--no-fatal-infos` if you want CI to fail on lint warnings too)
      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos

      # 5. Run flutter test
      - name: Run flutter test
        run: flutter test

      # Apply versionCode/versionName derived from the git tag when this
      # run was triggered by a version tag (vX.Y.Z) — see "Version
      # management" in docs/RELEASE.md.
      - name: Derive version from tag (release builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Building release version: $TAG_VERSION"
          sed -i "s/^version: .*/version: ${TAG_VERSION}+${GITHUB_RUN_NUMBER}/" pubspec.yaml
          cat pubspec.yaml | grep '^version:'

      # 6. Build APK (release). No signing config is required: if
      # android/key.properties is absent, android/app/build.gradle falls
      # back to debug signing so this step always succeeds out of the box.
      # Add real signing by following docs/RELEASE.md if you need a
      # Play-Store-ready signed APK.
      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Build debug APK (PRs only, for quick install/testing)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # 7. Upload APK(s) as workflow artifacts
      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: dav-code-release-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dav-code-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Release automation: when a vX.Y.Z tag is pushed, attach the built APKs
  # to a GitHub Release automatically (see docs/RELEASE.md for how to cut
  # a new tagged release).
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APKs
        uses: actions/download-artifact@v4
        with:
          name: dav-code-release-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          name: "Dav Code ${{ github.ref_name }}"
